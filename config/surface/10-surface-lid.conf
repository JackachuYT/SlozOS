# Surface Pro 2 — the SP1/SP2 DSDT reports a bogus "lid closed" after S3 resume,
# causing an infinite suspend/resume loop. Ignore lid-switch events so closing
# the cover (or a wonky sensor) never triggers suspend. Pairs with the
# button.lid_init_state=open kernel argument.
[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
