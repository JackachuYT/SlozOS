# Surface Pro 2 — Marvell WiFi stability.
# disable_auto_ds=1 deactivates auto deep-sleep, the #1 cause of mwifiex
# firmware hangs / random disconnects on this chipset. (This is a valid core
# mwifiex parameter and applies whether the radio is the USB 88W8797 or the
# PCIe 88W8897 variant.) We intentionally avoid mwifiex_pcie-only params like
# ps_mode= — an unknown param would make the module refuse to load = no WiFi.
options mwifiex disable_auto_ds=1
