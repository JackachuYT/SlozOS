name: Build SlozOS ISOs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'assets/**'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      fail-fast: false          # keep building the others if one fails
      matrix:
        include:
          - device: sp2
            display_name: Surface Pro 2
            containerfile: build/Containerfile.sp2
            image_tag: slozos-sp2
            iso_name: SlozOS-1.0-SP2-amd64
            artifact: SlozOS-SP2-ISO
            release_tag: v1.0-sp2
            release_title: "SlozOS 1.0 — Surface Pro 2"
            release_notes: |
              SlozOS 1.0 for the **Microsoft Surface Pro 2** (2013, Haswell).

              **Hardware support:**
              - ✅ Keyboard / Type Cover
              - ✅ Touchscreen & Pen
              - ✅ WiFi (Marvell 88W8797 USB)
              - ✅ Bluetooth
              - ✅ Cameras (front + rear, uvcvideo)
              - ✅ Audio
              - ✅ Suspend / Hibernate
              - ✅ Sensors & Battery
              - ❌ Performance Modes (not supported)

              The ISO (~5.5 GB) is split into 1900 MB parts. Download all parts into one folder, then reassemble:
              ```
              7z x SlozOS-1.0-SP2-amd64.7z.001
              ```
              Flash `SlozOS-1.0-SP2-amd64.iso` with Balena Etcher. Boot the Surface with **Volume Down + Power**.

          - device: sp1
            display_name: Surface Pro 1
            containerfile: build/Containerfile.sp1
            image_tag: slozos-sp1
            iso_name: SlozOS-0.1-Alpha-SP1-amd64
            artifact: SlozOS-SP1-ISO
            release_tag: v0.1-alpha-sp1
            release_title: "SlozOS 0.1 Alpha — Surface Pro 1"
            release_notes: |
              SlozOS 0.1 Alpha for the **Microsoft Surface Pro 1** (2013, Ivy Bridge).

              > ⚠️ **Alpha / Low-maintenance release.** The Surface Pro 1 is fully functional but this edition receives minimal updates. Use at your own risk.

              **Hardware support:**
              - ✅ Keyboard / Type Cover
              - ✅ Touchscreen & Pen
              - ✅ WiFi (Marvell USB)
              - ✅ Bluetooth
              - ✅ Both Cameras
              - ✅ Audio
              - ✅ Suspend / Hibernate
              - ✅ Sensors & Battery
              - ❌ Performance Modes (not supported)

              The ISO (~5.5 GB) is split into 1900 MB parts. Download all parts into one folder, then reassemble:
              ```
              7z x SlozOS-0.1-Alpha-SP1-amd64.7z.001
              ```
              Flash `SlozOS-0.1-Alpha-SP1-amd64.iso` with Balena Etcher. Boot the Surface with **Volume Down + Power**.

          - device: sb1
            display_name: Surface Book 1
            containerfile: build/Containerfile.sb1
            image_tag: slozos-sb1
            iso_name: SlozOS-1.0-SB1-amd64
            artifact: SlozOS-SB1-ISO
            release_tag: v1.0-sb1
            release_title: "SlozOS 1.0 — Surface Book 1"
            release_notes: |
              SlozOS 1.0 for the **Microsoft Surface Book 1** (2015, Skylake + NVIDIA GTX 940M).

              **Hardware support:**
              - ✅ Keyboard & Touchpad
              - ✅ Touchscreen & Pen
              - ✅ WiFi (Marvell 88W8897 PCIe)
              - ✅ Bluetooth
              - ✅ Dedicated GPU (GTX 940M via PRIME)
              - ✅ Clipboard Detachment
              - ✅ Audio, Sensors, Battery
              - ✅ Suspend / Hibernate
              - ❌ Performance Modes (not supported)
              - ❓ Cameras (status unclear)

              The ISO (~5.5 GB) is split into 1900 MB parts. Download all parts into one folder, then reassemble:
              ```
              7z x SlozOS-1.0-SB1-amd64.7z.001
              ```
              Flash `SlozOS-1.0-SB1-amd64.iso` with Balena Etcher. Boot with **Volume Down + Power**.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h /

      - name: Build SlozOS ${{ matrix.display_name }} image
        run: |
          sudo podman build \
            -t localhost/${{ matrix.image_tag }}:latest \
            -f ${{ matrix.containerfile }} .

      - name: Generate bootable ISO
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/output:/output" \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --local \
            localhost/${{ matrix.image_tag }}:latest

      - name: Rename ISO
        run: |
          ISO=$(sudo find output -name '*.iso' | head -1)
          sudo mv "$ISO" output/${{ matrix.iso_name }}.iso
          sudo chown "$USER:$USER" output/${{ matrix.iso_name }}.iso
          ls -lh output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: output/${{ matrix.iso_name }}.iso
          retention-days: 7

      - name: Split ISO into <2GB volumes
        run: |
          sudo apt-get update -q
          sudo apt-get install -y p7zip-full
          cd output && 7z a -mx=0 -v1900m ${{ matrix.iso_name }}.7z ${{ matrix.iso_name }}.iso
          ls -lh ${{ matrix.iso_name }}.7z.*

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ${{ matrix.release_tag }} --yes --cleanup-tag || true
          gh release create ${{ matrix.release_tag }} \
            --title "${{ matrix.release_title }}" \
            --notes "${{ matrix.release_notes }}" \
            output/${{ matrix.iso_name }}.7z.*
